version: 2
updates:
  # GitHub Actions versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 2
    groups:
      all-actions:
        patterns:
          - '*'

  # npm (root workspace) — security-only by default so a single weekly sweep
  # doesn't open dozens of PRs (Cloudflare Pages spins a preview for each).
  # Use `gh pr create` manually if you need a version-bump PR outside of an
  # advisory.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 3
    versioning-strategy: increase-if-necessary
    groups:
      # Bundle everything not security-related into a single PR per sweep.
      all-npm:
        patterns:
          - '*'
        update-types:
          - patch
          - minor

  # Cargo — same shape.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 2
    groups:
      all-cargo:
        patterns:
          - '*'
        update-types:
          - patch
          - minor
