name: Node

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/core/**'
      - 'packages/client/**'
      - 'packages/react/**'
      - 'packages/adapters/**'
      - 'packages/adapter-better-auth/**'
      - 'packages/mcp-server/**'
      - 'packages/schema/**'
      - 'packages/create-topgun-app/**'
      - 'apps/docs-astro/**'
      - 'apps/admin-dashboard/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.github/workflows/node.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/core/**'
      - 'packages/client/**'
      - 'packages/react/**'
      - 'packages/adapters/**'
      - 'packages/adapter-better-auth/**'
      - 'packages/mcp-server/**'
      - 'packages/schema/**'
      - 'packages/create-topgun-app/**'
      - 'apps/docs-astro/**'
      - 'apps/admin-dashboard/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.github/workflows/node.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test-lint:
    name: Build · Test · Lint
    runs-on: ubuntu-latest
    # 25m headroom over the real ~15m run. The previous 20m cancellations were NOT
    # slowness — several packages (client, mcp-server) finish their tests but leave
    # open handles (WebSocket reconnect timers, spawned topgun-server children), so
    # jest never exits and the recursive run stalls until the cap. The real fix is
    # --forceExit on the Unit tests step below. Proper per-test teardown + not running
    # server-dependent tests in this Node-only job is tracked in TODO-448.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm via corepack
        # Mirrors the proven pattern in rust.yml/cross-lang. Avoids the
        # pnpm/action-setup@v4 + packageManager-field interaction that
        # caused a workflow-level startup_failure on commits 6bbe8ab5
        # and 09256e90.
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Unit tests (TEMP diagnostic — client open handles; revert after)
        # TEMPORARY: run only @topgunbuild/client under --detectOpenHandles to capture
        # which async handle keeps the process alive on the CI runner (it exits fine
        # locally). Will be reverted once the leak is identified + fixed. See TODO-448.
        run: |
          cd packages/client
          # --detectOpenHandles instruments async ops (slow); give it room. Target the
          # cluster-mode suite first (prime suspect: ConnectionPool/SingleServerProvider).
          timeout -s KILL 600 pnpm exec jest --runInBand --detectOpenHandles src/__tests__/TopGunClient.test.ts > /tmp/c.log 2>&1 || true
          echo "===== OPEN HANDLES REPORT ====="
          grep -nE -A18 "Jest has detected|open handle|cannot log after" /tmp/c.log | grep -vE '"level":[0-9]+' | head -180 || true
          echo "===== TEST RESULT TAIL ====="
          grep -E "Tests:|Test Suites:|Force exiting|Ran all|Killed" /tmp/c.log | tail -10 || true

      - name: Lint (eslint)
        run: pnpm lint

      - name: Format check (prettier)
        run: pnpm format:check

  mcp-publish-check:
    name: MCP publish pre-check (boot-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Verify `npx -y @topgunbuild/mcp-server` boot path
        # Packs the three user-facing packages with `pnpm pack`, installs them
        # in a clean sandbox WITHOUT devDependencies (matching what an npm
        # user gets via `npx -y @topgunbuild/mcp-server`), and asserts the
        # server boots and registers all 8 MCP tools. Guards against
        # devDep-only modules sneaking into the runtime path (see commit
        # e6050a93 where pino-pretty crashed the whole flow).
        run: ./scripts/verify-mcp-publish.sh

  docs-build:
    name: docs-astro build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build docs-astro
        # Pre-merge gate: catches broken MDX, missing imports, dead
        # internal links before Cloudflare Pages reports them post-merge.
        run: pnpm --filter apps-docs-astro build
