name: Node

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/core/**'
      - 'packages/client/**'
      - 'packages/react/**'
      - 'packages/adapters/**'
      - 'packages/adapter-better-auth/**'
      - 'packages/mcp-server/**'
      - 'packages/schema/**'
      - 'packages/create-topgun-app/**'
      - 'apps/docs-astro/**'
      - 'apps/admin-dashboard/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.github/workflows/node.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/core/**'
      - 'packages/client/**'
      - 'packages/react/**'
      - 'packages/adapters/**'
      - 'packages/adapter-better-auth/**'
      - 'packages/mcp-server/**'
      - 'packages/schema/**'
      - 'packages/create-topgun-app/**'
      - 'apps/docs-astro/**'
      - 'apps/admin-dashboard/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.github/workflows/node.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test-lint:
    name: Build · Test · Lint
    runs-on: ubuntu-latest
    # Real test wall time is ~3m (core + client + mcp-server + adapters/react).
    # mcp-server alone takes ~55s because of five 5-second queryOnce settle-waits.
    # 18m leaves comfortable headroom over the observed ~3m run while still
    # catching genuine hangs well before the GitHub Actions 6h job cap.
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm via corepack
        # Mirrors the proven pattern in rust.yml/cross-lang. Avoids the
        # pnpm/action-setup@v4 + packageManager-field interaction that
        # caused a workflow-level startup_failure on commits 6bbe8ab5
        # and 09256e90.
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Unit tests
        # TEMP DIAGNOSTIC (revert after): a CI-only hang stops the run after the
        # client package — it does NOT reproduce locally (full `pnpm -r exec jest
        # --runInBand` exits clean, 0 "did not exit"). pnpm -r prints no package
        # boundaries, so this prints a marker per package and bounds each package
        # with a 240s timeout: the hanging package names itself and fails fast
        # instead of letting the whole job hit the 18m cap. Restore the plain
        # `pnpm -r exec jest --runInBand --passWithNoTests` once identified.
        run: |
          pnpm -r exec sh -c '
            pkg=$(basename "$(pwd)")
            echo ">>>> PKG START: $pkg"
            timeout --signal=KILL 240 jest --runInBand --passWithNoTests
            code=$?
            echo ">>>> PKG END: $pkg exit=$code"
            exit $code
          '

      - name: Lint (eslint)
        run: pnpm lint

      - name: Format check (prettier)
        run: pnpm format:check

  mcp-publish-check:
    name: MCP publish pre-check (boot-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Verify `npx -y @topgunbuild/mcp-server` boot path
        # Packs the three user-facing packages with `pnpm pack`, installs them
        # in a clean sandbox WITHOUT devDependencies (matching what an npm
        # user gets via `npx -y @topgunbuild/mcp-server`), and asserts the
        # server boots and registers all 8 MCP tools. Guards against
        # devDep-only modules sneaking into the runtime path (see commit
        # e6050a93 where pino-pretty crashed the whole flow).
        run: ./scripts/verify-mcp-publish.sh

  docs-build:
    name: docs-astro build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build docs-astro
        # Pre-merge gate: catches broken MDX, missing imports, dead
        # internal links before Cloudflare Pages reports them post-merge.
        run: pnpm --filter apps-docs-astro build
