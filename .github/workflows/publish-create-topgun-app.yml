name: Publish create-topgun-app to npm

on:
  push:
    tags: ['create-topgun-app-v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter create-topgun-app test

      - name: Build package
        run: pnpm --filter create-topgun-app build

      - name: Verify tag version matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#create-topgun-app-v}"
          PKG_VERSION=$(node -p "require('./packages/create-topgun-app/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version $TAG_VERSION != package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version match confirmed: $PKG_VERSION"

      - name: Publish to npm
        working-directory: packages/create-topgun-app
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
