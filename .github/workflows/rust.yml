name: Rust

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/core-rust/**'
      - 'packages/server-rust/**'
      - 'packages/core/src/schemas/**'
      - 'packages/core/src/__tests__/cross-lang-fixtures*'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/core-rust/**'
      - 'packages/server-rust/**'
      - 'packages/core/src/schemas/**'
      - 'packages/core/src/__tests__/cross-lang-fixtures*'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'
  # Perf gates are informational and slow; run them nightly off the PR critical path
  # so PRs never time out waiting for multi-minute harness builds + benchmark scenarios.
  schedule:
    - cron: '0 6 * * *'
  # Manual trigger for on-demand perf runs (the perf gates gate on schedule || workflow_dispatch).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rustup ships preinstalled on ubuntu-latest. `rustup show` honors the
        # pinned channel in rust-toolchain.toml; component add ensures fmt/clippy
        # are present for the fmt-check and clippy steps below.
        # Uses a run: step rather than a third-party toolchain action because the
        # repo's allowed_actions=selected policy permits only first-party actions/*
        # and verified Marketplace creators — same fix applied to node.yml for
        # pnpm/action-setup (corepack run: step).
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

  cross-lang:
    name: Cross-Language Protocol Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rustup ships preinstalled on ubuntu-latest; `rustup show` honors the
        # pinned channel in rust-toolchain.toml. Uses a run: step rather than
        # a third-party toolchain action (see check job comment for rationale).
        run: rustup show

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build core package
        run: pnpm --filter @topgunbuild/core build

      - name: Generate cross-language fixtures
        run: pnpm --filter @topgunbuild/core test -- --testPathPattern cross-lang-fixtures

      - name: Verify Rust decodes TS fixtures
        run: cargo test --test cross_lang_compat

  perf-gate:
    name: Performance Gate
    needs: [check]
    # Perf gate is informational + slow; run on the nightly schedule only so a push-to-main
    # never triggers a timeout-induced cancellation that reddens the badge. Perf coverage is
    # retained via the existing cron: '0 6 * * *' above.
    #
    # Trade-off (schedule-only): narrowing from != 'pull_request' to == 'schedule' also removes
    # per-merge perf signal on push-to-main/develop. A regression merged after the 06:00 cron
    # stays invisible until the next nightly tick (~23h). Acceptable for an informational gate,
    # but documented here so the lost push-time signal is explicit, not silent.
    # workflow_dispatch added so an on-demand manual run exercises this gate too.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Informational only — does not block merges while baseline stability is validated
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rustup ships preinstalled on ubuntu-latest; `rustup show` honors the
        # pinned channel in rust-toolchain.toml. Uses a run: step rather than
        # a third-party toolchain action (see check job comment for rationale).
        run: rustup show

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-perf-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-perf-
            ${{ runner.os }}-cargo-

      - name: Build load harness
        # Explicit build step surfaces compilation failures before the longer scenario runs begin
        run: cargo build --release --bench load_harness

      - name: Run fire-and-wait scenario
        run: |
          cargo bench --bench load_harness -- \
            --scenario throughput \
            --connections 200 \
            --duration 15 \
            --interval 50 \
            --json-output results-faw.json

      - name: Run fire-and-forget scenario
        run: |
          cargo bench --bench load_harness -- \
            --scenario throughput \
            --connections 200 \
            --duration 15 \
            --interval 0 \
            --fire-and-forget \
            --json-output results-faf.json

      - name: Validate results against baseline
        run: |
          BASELINE=packages/server-rust/benches/load_harness/baseline.json

          FAW_OPS=$(jq '.ops_per_sec' results-faw.json)
          FAW_P50=$(jq '.latency.p50_us' results-faw.json)
          FAW_MIN_OPS=$(jq '.fire_and_wait.min_ops_per_sec' "$BASELINE")
          FAW_MAX_P50=$(jq '.fire_and_wait.max_p50_us' "$BASELINE")

          echo "fire-and-wait: ops/sec=$FAW_OPS (min=$FAW_MIN_OPS), p50=${FAW_P50}µs (max=${FAW_MAX_P50}µs)"

          FAILED=0
          if [ "$FAW_OPS" -lt "$FAW_MIN_OPS" ]; then
            echo "FAIL: fire-and-wait ops/sec $FAW_OPS < baseline $FAW_MIN_OPS"
            FAILED=1
          fi
          if [ "$FAW_P50" -gt "$FAW_MAX_P50" ]; then
            echo "FAIL: fire-and-wait p50 ${FAW_P50}µs > baseline ${FAW_MAX_P50}µs"
            FAILED=1
          fi

          FAF_OPS=$(jq '.ops_per_sec' results-faf.json)
          FAF_P50=$(jq '.latency.p50_us' results-faf.json)
          FAF_MIN_OPS=$(jq '.fire_and_forget.min_ops_per_sec' "$BASELINE")
          FAF_MAX_P50=$(jq '.fire_and_forget.max_p50_us' "$BASELINE")

          echo "fire-and-forget: ops/sec=$FAF_OPS (min=$FAF_MIN_OPS), p50=${FAF_P50}µs (max=${FAF_MAX_P50}µs)"

          if [ "$FAF_OPS" -lt "$FAF_MIN_OPS" ]; then
            echo "FAIL: fire-and-forget ops/sec $FAF_OPS < baseline $FAF_MIN_OPS"
            FAILED=1
          fi
          if [ "$FAF_P50" -gt "$FAF_MAX_P50" ]; then
            echo "FAIL: fire-and-forget p50 ${FAF_P50}µs > baseline ${FAF_MAX_P50}µs"
            FAILED=1
          fi

          exit $FAILED

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_id }}
          path: |
            results-faw.json
            results-faf.json
          retention-days: 90

  vector-perf-gate:
    name: Vector Performance Gate
    needs: [check]
    # Perf gates are informational + slow + non-deterministic on shared runners (baselines were
    # measured on M1 Max; Ubuntu runners drift 15-20% run-to-run, so a push-time gate just plays
    # baseline whack-a-mole and reddens the badge). Run nightly-only (cron schedule) — mirrors
    # the Performance Gate job. Perf coverage is retained via the nightly schedule + manual
    # workflow_dispatch, off the push-to-main critical path.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Informational only — baselines measured on M1 Max; Ubuntu runners may differ
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rustup ships preinstalled on ubuntu-latest; `rustup show` honors the
        # pinned channel in rust-toolchain.toml. Uses a run: step rather than
        # a third-party toolchain action (see check job comment for rationale).
        run: rustup show

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-perf-vector-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-perf-
            ${{ runner.os }}-cargo-

      - name: Build load harness
        # Explicit build step surfaces compilation failures before the longer scenario runs begin
        run: cargo build --release --bench load_harness

      - name: Run vector build scenario
        run: |
          cargo bench --bench load_harness -- \
            --scenario vector_search --vector-mode build \
            --vector-count 10000 --vector-dim 384 \
            --json-output results-vec-build.json

      - name: Run vector query scenario
        run: |
          cargo bench --bench load_harness -- \
            --scenario vector_search --vector-mode query \
            --vector-count 10000 --vector-dim 384 \
            --vector-k 10 --duration 10 \
            --json-output results-vec-query.json

      - name: Run vector optimize scenario
        run: |
          cargo bench --bench load_harness -- \
            --scenario vector_search --vector-mode optimize \
            --vector-count 10000 --vector-dim 384 \
            --json-output results-vec-optimize.json

      - name: Run vector hybrid scenario
        run: |
          cargo bench --bench load_harness -- \
            --scenario vector_search --vector-mode hybrid \
            --vector-count 10000 --vector-dim 384 \
            --duration 10 \
            --json-output results-vec-hybrid.json

      - name: Validate results against baseline
        run: |
          BASELINE=packages/server-rust/benches/load_harness/baseline.json
          FAILED=0

          for mode in build query optimize hybrid; do
            MEASURED_P50=$(jq ".latency.p50_us" "results-vec-${mode}.json")
            THRESHOLD_P50=$(jq ".vector_search.${mode}.max_p50_us" "$BASELINE")
            echo "vector-${mode}: p50=${MEASURED_P50}µs (max=${THRESHOLD_P50}µs)"
            if [ "$MEASURED_P50" -gt "$THRESHOLD_P50" ]; then
              echo "FAIL: vector-${mode} p50 regression"
              FAILED=1
            fi

            case "$mode" in
              build|optimize)
                MEASURED_P99=$(jq ".latency.p99_us" "results-vec-${mode}.json")
                THRESHOLD_P99=$(jq ".vector_search.${mode}.max_p99_us" "$BASELINE")
                echo "vector-${mode}: p99=${MEASURED_P99}µs (max=${THRESHOLD_P99}µs)"
                if [ "$MEASURED_P99" -gt "$THRESHOLD_P99" ]; then
                  echo "FAIL: vector-${mode} p99 regression"
                  FAILED=1
                fi
                ;;
            esac
          done

          exit $FAILED

      - name: Upload vector performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vector-perf-results-${{ github.run_id }}
          path: |
            results-vec-build.json
            results-vec-query.json
            results-vec-optimize.json
            results-vec-hybrid.json
          retention-days: 90

  simulation:
    name: Simulation Tests
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # No longer informational: distributed-correctness verification should
    # block merges. If a test flakes, fix it; don't paper over with
    # continue-on-error. (P11 H1)
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rustup ships preinstalled on ubuntu-latest; `rustup show` honors the
        # pinned channel in rust-toolchain.toml. Uses a run: step rather than
        # a third-party toolchain action (see check job comment for rationale).
        run: rustup show

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sim-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sim-
            ${{ runner.os }}-cargo-

      - name: Run simulation tests
        # Run the simulation + sim_smoke integration binaries IN FULL so EVERY
        # hand-written sim module gates merges. The previous `-- sim` substring
        # filter only matched test PATHS containing "sim" — that caught
        # proptest_sim::*, the sim_smoke `sim_*` names, and the src::sim lib
        # paths, but silently SKIPPED the crdt_convergence::*, merkle_sync::*,
        # cluster_membership::*, and event_journal::* modules. Those are the
        # convergence/durability/journal correctness gates (G3/G4a) that MUST
        # block; an under-selecting filter is a silent gate hole, the same
        # "test exists but isn't in the gate" class that let the F2 convergence
        # regression slip. Selecting the binaries by name (rather than dropping
        # the filter entirely) keeps the job scoped to simulation tests and out
        # of the unrelated, non-feature-gated integration binaries.
        run: |
          cargo test --profile ci-sim --features simulation -p topgun-server --test simulation --test sim_smoke
          # The SimCluster/SimNetwork harness's own unit tests live in the lib
          # target (src/sim/*); keep them gating via the path filter.
          cargo test --profile ci-sim --features simulation -p topgun-server --lib -- sim

  soak-smoke:
    name: Soak Harness Smoke (G4b)
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Blocking: the soak harness (TODO-484) must keep compiling AND its fault
    # detection must keep working. We run the two negative controls (which MUST
    # go RED) plus a short no-crash convergence/churn/memory soak (which MUST be
    # green). The full 72h crash-loop soak runs on a Hetzner scratch box, not in
    # CI. The crash-loop path is still RED at load — now due to TODO-546
    # (ack-before-durable), not the closed TODO-530 — so CI exercises the no-crash
    # mode here; the loaded no-crash variant is the separate non-blocking
    # soak-loaded job below. See packages/server-rust/benches/soak_harness/README.md.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-soak-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-soak-
            ${{ runner.os }}-cargo-

      - name: Build server binary + soak bench
        run: cargo build --bin topgun-server --bench soak_harness

      - name: Locate soak bench binary
        id: soak
        run: |
          BIN=$(ls -t target/debug/deps/soak_harness-* | grep -vE '\.(d|o|rcgu)' | head -1)
          test -x "$BIN" || { echo "soak bench binary not found"; exit 1; }
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"

      - name: Negative control — divergence must go RED
        run: |
          set +e
          OUT=$(${{ steps.soak.outputs.bin }} --inject-divergence); CODE=$?
          echo "$OUT"
          if [ "$CODE" -eq 0 ]; then echo "FAIL: divergence control did not go RED"; exit 1; fi
          echo "$OUT" | grep -q "divergence correctly detected" || { echo "FAIL: wrong divergence outcome (code $CODE)"; exit 1; }
          echo "OK: divergence detection RED as required (exit $CODE)"

      - name: Negative control — panic must go RED
        run: |
          set +e
          OUT=$(${{ steps.soak.outputs.bin }} --inject-panic); CODE=$?
          echo "$OUT"
          if [ "$CODE" -eq 0 ]; then echo "FAIL: panic control did not go RED"; exit 1; fi
          echo "$OUT" | grep -q "panic correctly captured" || { echo "FAIL: wrong panic outcome (code $CODE)"; exit 1; }
          echo "OK: panic detection RED as required (exit $CODE)"

      - name: Short no-crash soak must be GREEN
        run: |
          ${{ steps.soak.outputs.bin }} \
            --duration 25 --crash-interval 0 --steady-interval 6 \
            --churn-clients 6 --keyspace 48 --quiesce 3 \
            --json-output soak-smoke.json
          jq -e '.passed == true' soak-smoke.json >/dev/null \
            || { echo "FAIL: no-crash soak did not pass"; cat soak-smoke.json; exit 1; }
          echo "OK: no-crash soak passed"

      - name: OR-churn crash soak — acked OR adds must NOT be lost across recovery
        run: |
          # Gate the OR-Map directional no-loss invariant under kill -9 + OR churn.
          # We assert ONLY the absence of the OR loss signature, not the full
          # `passed == true`: a loaded with-crash soak can still RED on the open LWW
          # ack-before-durable window (TODO-546), which is a separate known-open
          # critical, not an OR regression. Coupling this step to `passed == true`
          # would just re-report TODO-546 and flap. The OR no-loss line is the
          # regression signal owned here.
          set +e
          OUT=$(${{ steps.soak.outputs.bin }} \
            --duration 30 --crash-interval 9 --or-churn true --or-every 3)
          echo "$OUT"
          # Real OR durability loss.
          if echo "$OUT" | grep -q "OR-Map acked add(s) LOST across recovery"; then
            echo "FAIL: acked OR-Map add(s) lost across crash recovery"
            exit 1
          fi
          # The OR check errored (post-recovery read failed) — a real loss could
          # hide behind it (it could even be the cause), so do not treat as green.
          if echo "$OUT" | grep -q "OR-Map no-loss check could not complete"; then
            echo "FAIL: OR-Map no-loss check could not complete"
            exit 1
          fi
          # Positive assertion that the OR check actually RAN. Without it, a crash or
          # early exit before the recovery check prints neither failure string, and
          # grepping for absence-of-loss alone would be vacuously green.
          if ! echo "$OUT" | grep -q "OR-Map no-loss check: PASS"; then
            echo "FAIL: OR-Map no-loss check did not run (no PASS marker — crash/early-exit?)"
            exit 1
          fi
          echo "OK: no OR-Map acked-add loss across recovery"

      - name: Upload soak smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-smoke-${{ github.run_id }}
          path: soak-smoke.json
          retention-days: 30

  soak-loaded:
    name: Soak Harness Loaded (G4b, non-blocking)
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # NON-BLOCKING (continue-on-error) loaded convergence soak. The fast soak-smoke
    # gate above runs a tiny no-crash soak (churn 6 / keyspace 48 / 25s) that is too
    # small to build a write-behind backlog, so backlog-dependent durability/
    # convergence regressions cannot surface there — exactly the gap that masked
    # SPEC-325b AC1 (which only failed at keyspace ~200 / churn ~16). This job drives
    # a real backlog (churn 16 / keyspace 200 / 150s, no-crash) so those regressions
    # fail at PR/CI time instead of only at the 72h Hetzner run or in production.
    #
    # Why NO-CRASH at load: a loaded WITH-crash soak is currently RED purely due to
    # the open ack-before-durable gap (TODO-546) — acked-but-unflushed writes are lost
    # on kill -9 at load. That is a known-open critical, not a fresh regression, so a
    # with-crash gate here would just re-report TODO-546. The with-crash loaded
    # reproducer stays local/Hetzner as the TODO-546 validator; once TODO-546 is fixed
    # it should be promoted into CI as a blocking crash-recovery-at-load gate.
    #
    # Why non-blocking for now: this GREEN result is established on local debug/macOS;
    # it is not yet validated on ubuntu CI. Promote to BLOCKING after >=10 consecutive
    # green runs on main (owner: stabilization-program G4b gate). Until then it is
    # advisory so a CI-platform flake never blocks merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-soak-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-soak-
            ${{ runner.os }}-cargo-

      - name: Build server binary + soak bench
        run: cargo build --bin topgun-server --bench soak_harness

      - name: Locate soak bench binary
        id: soak
        run: |
          BIN=$(ls -t target/debug/deps/soak_harness-* | grep -vE '\.(d|o|rcgu)' | head -1)
          test -x "$BIN" || { echo "soak bench binary not found"; exit 1; }
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"

      - name: Loaded no-crash convergence soak must be GREEN
        run: |
          # Loaded params build a real write-behind backlog (vs the tiny smoke) — the
          # with-crash variant at these exact params loses acked-but-unflushed writes
          # on kill -9 (TODO-546), direct proof the backlog is real and non-trivial;
          # this no-crash run exercises convergence under that same write pressure.
          # Memory: the slope threshold stays at the honest default (50 MB/h) but the
          # min-growth guard makes the slope arm fire only as a GROSS-leak tripwire — a
          # 150s OR-churn burst's slope extrapolation is not a valid slow-leak signal
          # (that is the 72h run's job); the ceiling is the real OOM guard. Observed
          # legitimate peak growth at this load is ~190MB, so 300MB min-growth clears
          # it with margin while still tripping on a runaway leak, and a 900MB ceiling
          # catches a runaway sooner. This job gates on CONVERGENCE-under-backlog.
          ${{ steps.soak.outputs.bin }} \
            --duration 150 --crash-interval 0 --steady-interval 15 \
            --churn-clients 16 --keyspace 200 --quiesce 3 \
            --mem-min-growth-mb 300 --mem-ceiling-mb 900 \
            --json-output soak-loaded.json
          # Assert the load actually ran (totalWrites floor the tiny smoke cannot reach,
          # guarding against a silent mis-edit that shrinks params back to smoke scale)
          # AND convergence/memory/panic passed.
          jq -e '.passed == true and .totalWrites > 20000' soak-loaded.json >/dev/null \
            || { echo "FAIL: loaded no-crash soak did not pass or did not build load"; cat soak-loaded.json; exit 1; }
          echo "OK: loaded no-crash convergence soak passed"

      - name: Upload loaded soak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-loaded-${{ github.run_id }}
          path: soak-loaded.json
          retention-days: 30

  audit:
    name: Cargo Audit (RustSec advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        # Fails on any known advisory. Vulnerabilities are FIXED via dep bumps
        # wherever a patched release exists. The single --ignore below is an
        # advisory with NO available fix AND no reachable exposure; its full
        # justification lives in audit.toml at the repo root. Re-review on every
        # dependency bump.
        #   RUSTSEC-2023-0071 (rsa Marvin Attack): no fixed upgrade; rsa is pulled
        #   only by sqlx-mysql, but the server uses the postgres backend, so the
        #   vulnerable RSA path is never compiled or exercised.
        run: cargo audit --ignore RUSTSEC-2023-0071
