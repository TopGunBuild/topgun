[package]
name = "topgun-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "TopGun server: axum, tokio, clustering, storage"

[lints]
workspace = true

[features]
default = []
postgres = ["dep:sqlx"]
simulation = ["dep:madsim"]
datafusion = ["dep:datafusion", "dep:arrow"]

[dependencies]
topgun-core = { path = "../core-rust", features = ["arrow"] }
async-trait = "0.1"
anyhow = "1"
axum = { version = "0.8", features = ["ws"] }
axum-server = { version = "0.7", features = ["tls-rustls"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "sync", "time", "net"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors", "timeout", "request-id", "compression-gzip", "fs"] }
futures-util = { version = "0.3", default-features = false, features = ["sink"] }
dashmap = "6"
parking_lot = "0.12"
thiserror = "2"
arc-swap = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"
rmpv = { version = "1", features = ["with-serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "fmt"] }
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", default-features = false, features = ["http-listener"] }
uuid = { version = "1", features = ["v4"] }
bytes = "1"
http = "1"
rand = "0.9"
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres"], optional = true }
madsim = { workspace = true, optional = true }
datafusion = { version = "45", optional = true }
arrow = { version = "54", optional = true }
tantivy = "0.22"
jsonwebtoken = "9"
subtle = "2"
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-axum = "0.2"
utoipa-swagger-ui = { version = "9", features = ["axum"] }

[[bin]]
name = "test-server"
path = "src/bin/test_server.rs"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "test-util", "time"] }
reqwest = { version = "0.12", features = ["json"] }
tokio-tungstenite = "0.26"
hdrhistogram = "7"
proptest = "1"

[[bench]]
name = "load_harness"
path = "benches/load_harness/main.rs"
harness = false
